name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/VsaTemplate.slnx

      - name: Build
        run: dotnet build src/VsaTemplate.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/VsaTemplate.slnx --configuration Release --no-build --verbosity normal